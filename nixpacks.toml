[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.pdo_sqlite", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.gd", "php84Extensions.tokenizer", "php84Extensions.fileinfo", "php84Extensions.bcmath", "php84Extensions.ctype", "php84Extensions.openssl", "php84Extensions.dom"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "bash start.sh"

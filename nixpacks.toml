[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.pdo_sqlite", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.tokenizer", "php82Extensions.fileinfo", "php82Extensions.bcmath", "php82Extensions.ctype", "php82Extensions.openssl", "php82Extensions.dom"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "bash start.sh"
